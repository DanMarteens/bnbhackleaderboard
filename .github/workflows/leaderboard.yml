name: leaderboard
on:
  # Primary updates run on the VPS every ~60s (CMC prices + single-writer state).
  # GitHub schedule is disabled to avoid two writers fighting; kept as a manual fallback.
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:
permissions:
  contents: write               # to commit the one-time go-live baseline
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "eth-abi" "eth-hash[pycryptodome]" pyyaml
      - name: Compute rule-accurate flows and leaderboard
        env:
          ARCHIVE_RPC: ${{ secrets.ARCHIVE_RPC }}
          CMC_MCP_API_KEY: ${{ secrets.CMC_MCP_API_KEY }}
          SIM_COST_BPS: ${{ vars.SIM_COST_BPS || '0' }}
        run: |
          GO_LIVE=$(date -u -d "2026-06-22 00:00:00" +%s)
          NOW=$(date -u +%s)
          HOUR=$(date -u +%H)
          FLAGS=""
          # Re-enumerate registrants once a day (registration stays open mid-event).
          # Needs the archive RPC; skipped gracefully if the secret isn't set.
          if [ "$HOUR" = "00" ] && [ -n "$ARCHIVE_RPC" ]; then
            echo "daily re-enumeration of registrants"
            FLAGS="$FLAGS --enumerate"
          fi
          # Snapshot the baseline ONLY in the first 30 min after go-live. The frozen
          # baseline is committed to the repo, so this should never fire; the time guard
          # ensures a missing file later can't silently re-baseline (which would peg PnL to 0).
          if [ ! -f dashboard/lb_baseline.json ] && [ "$NOW" -ge "$GO_LIVE" ] && [ $((NOW - GO_LIVE)) -lt 1800 ]; then
            echo "Competition open + no baseline yet -> snapshotting go-live baseline"
            FLAGS="$FLAGS --baseline"
          fi
          echo "flags:$FLAGS"
          # Cost-basis flows must be refreshed before PnL. Otherwise a deposit can be
          # mistaken for profit in this manual fallback deployment.
          python scripts/flows_costbasis.py --force
          python scripts/leaderboard.py $FLAGS
      - name: Persist history + baseline
        run: |
          git config user.name "leaderboard-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A dashboard/ 2>/dev/null || true   # all state files (gitignore excludes leaderboard.json/lb_decimals.json)
          git commit -m "snapshot [skip ci]" || true
          # rebase + retry so a concurrent push never drops the commit (the old `git push || true`
          # was silently failing on non-fast-forward, so history/baseline never persisted).
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "pushed"; break; } || { echo "push retry $i"; sleep 4; }
          done
      - name: Build page
        run: python scripts/build_leaderboard.py dashboard/leaderboard.json public/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
      - name: Deploy to Cloudflare Pages (canonical bnbhackleaderboard.pages.dev)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "f12343f4f5f0d268f6c7df8d23a15859"
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx -y wrangler@latest pages deploy public --project-name=bnbhackleaderboard --branch=main --commit-dirty=true
          else
            echo "CLOUDFLARE_API_TOKEN secret not set -> skipping pages.dev deploy (GitHub Pages still updated)"
          fi
