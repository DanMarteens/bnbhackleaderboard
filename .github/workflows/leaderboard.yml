name: leaderboard
on:
  schedule:
    - cron: "*/30 * * * *"      # refresh every 30 min during the competition
  workflow_dispatch:
permissions:
  contents: write               # to commit the one-time go-live baseline
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "eth-abi" "eth-hash[pycryptodome]" pyyaml
      - name: Compute leaderboard (free public RPC + Multicall3 + coingecko)
        run: |
          GO_LIVE=$(date -u -d "2026-06-22 00:00:00" +%s)
          NOW=$(date -u +%s)
          if [ ! -f dashboard/lb_baseline.json ] && [ "$NOW" -ge "$GO_LIVE" ]; then
            echo "Competition open + no baseline yet -> snapshotting go-live baseline"
            python scripts/leaderboard.py --baseline
            git config user.name "leaderboard-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dashboard/lb_baseline.json
            git commit -m "go-live baseline [skip ci]" || true
            git push || true
          else
            python scripts/leaderboard.py
          fi
      - name: Build page
        run: python scripts/build_leaderboard.py dashboard/leaderboard.json public/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
